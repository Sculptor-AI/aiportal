name = "aiportal"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Pages full-stack deployment
# Frontend static assets + _worker.js for API are both in ./dist
# Pages Git CI/CD auto-deploys on push to main
pages_build_output_dir = "./dist"

# ============================================================================
# KV Namespace Configuration
# ============================================================================
[[kv_namespaces]]
binding = "KV"
id = "2c3ee1f2bc814ca7b2e0759397135228"

# ============================================================================
# Environment Variables / Secrets
# ============================================================================
# API keys are stored as encrypted secrets in the Pages project settings.
# Manage via CLI:
#   npx wrangler pages secret put OPENROUTER_API_KEY --project-name=aiportal
#   npx wrangler pages secret put GEMINI_API_KEY --project-name=aiportal
#   npx wrangler pages secret put ANTHROPIC_API_KEY --project-name=aiportal
#   npx wrangler pages secret put OPENAI_API_KEY --project-name=aiportal
#
# Or via Cloudflare dashboard: Pages > aiportal > Settings > Environment variables
#
# For local development, create a .dev.vars file (see .dev.vars.example)
# ============================================================================
